<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticari Bina Yatırım Analizi</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f5f4f0;
        color: #1a1a18;
        min-height: 100vh;
      }
      #root { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
      input, select, textarea, button {
        font-family: inherit;
        font-size: 14px;
        border: 1px solid #d0cfc7;
        border-radius: 8px;
        padding: 8px 12px;
        background: #fff;
        color: #1a1a18;
        outline: none;
        transition: border-color 0.15s;
      }
      input:focus, select:focus, textarea:focus { border-color: #666; }
      button {
        cursor: pointer;
        background: #fff;
        transition: background 0.15s, transform 0.1s;
      }
      button:hover { background: #f0efe8; }
      button:active { transform: scale(0.98); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      a { color: #185FA5; }
      @media (prefers-color-scheme: dark) {
        body { background: #1a1a18; color: #e8e6dc; }
        input, select, textarea, button { background: #2a2a28; border-color: #444; color: #e8e6dc; }
        button:hover { background: #333; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
